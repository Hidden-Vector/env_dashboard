name: 환경 데이터 매일 자동 갱신

on:
  schedule:
    # cron은 UTC 기준입니다. UTC 22:00 = 한국시간(KST) 다음날 07:00
    - cron: "0 22 * * *"
  workflow_dispatch: {}   # Actions 탭에서 수동으로도 즉시 실행 가능

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 데이터 수집 스크립트 실행
        env:
          AIRKOREA_KEY: ${{ secrets.AIRKOREA_KEY }}
          KPX_KEY: ${{ secrets.KPX_KEY }}
        run: python scripts/collect_data.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "env-dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/daily.json
          git diff --cached --quiet && echo "변경사항 없음" || git commit -m "데이터 자동 갱신 $(date -u +%Y-%m-%d)"
          git push
